name: Release

on:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    permissions:
      actions: write
      contents: write
      id-token: write
      pull-requests: write
    uses: SylphxAI/.github/.github/workflows/release.yml@main
    secrets: inherit
